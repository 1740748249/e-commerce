server:
  port: 8084
  tomcat:
    uri-encoding: UTF-8
spring:
  profiles:
    active: dev
  application:
    name: notification-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs:
          - data-id: shared-spring.yaml
            refresh: false
          - data-id: shared-mybatis.yaml
            refresh: false
          - data-id: shared-logs.yaml
            refresh: false
          - data-id: shared-mq.yaml
            refresh: false
          - data-id: shared-redis.yaml
            refresh: false

ecommerce:
  jdbc:
    database: ecommerce_notification

logging:
  level:
    com.ecommerce: debug
